services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-C", "-S", "localhost", "-U", "sa", "-P", "${SA_PASSWORD}", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10


  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  app:
    image: ${APP_IMAGE}
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      AllowedHosts: ${ALLOWED_HOSTS:-localhost;127.0.0.1}
      Security__AllowInsecureCookiesForLocalHttp: ${ALLOW_INSECURE_COOKIES_FOR_LOCAL_HTTP:-false}
      OperationalEndpoints__AllowAnonymousHealth: "false"
      OperationalEndpoints__AllowAnonymousMetrics: "${ALLOW_METRICS:-true}"
      ForwardedHeaders__ForwardLimit: ${FORWARDED_HEADERS_FORWARD_LIMIT:-2}
      ForwardedHeaders__KnownProxies__0: ${FORWARDED_HEADERS_KNOWN_PROXY_0:-}
      ForwardedHeaders__KnownProxies__1: ${FORWARDED_HEADERS_KNOWN_PROXY_1:-}
      ForwardedHeaders__KnownProxies__2: ${FORWARDED_HEADERS_KNOWN_PROXY_2:-}
      ForwardedHeaders__KnownNetworks__0: ${FORWARDED_HEADERS_KNOWN_NETWORK_0:-}
      ForwardedHeaders__KnownNetworks__1: ${FORWARDED_HEADERS_KNOWN_NETWORK_1:-}
      ForwardedHeaders__KnownNetworks__2: ${FORWARDED_HEADERS_KNOWN_NETWORK_2:-}
      ConnectionStrings__DefaultConnection: Server=sqlserver;Database=RetailERPDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;Encrypt=False;MultipleActiveResultSets=true
      ConnectionStrings__Redis: redis:6379
      Jwt__SecretKey: ${JWT_SECRET}
      Smtp__Host: ${SMTP_HOST}
      Smtp__Port: ${SMTP_PORT}
      Smtp__UseStartTls: ${SMTP_USE_STARTTLS}
      Smtp__User: ${SMTP_USER}
      Smtp__Password: ${SMTP_PASSWORD}
      Smtp__FromEmail: ${SMTP_FROM_EMAIL}
      Smtp__FromName: ${SMTP_FROM_NAME}
      Razorpay__KeyId: ${RAZORPAY_KEY_ID}
      Razorpay__KeySecret: ${RAZORPAY_KEY_SECRET}
      Twilio__AccountSid: ${TWILIO_ACCOUNT_SID}
      Twilio__AuthToken: ${TWILIO_AUTH_TOKEN}
      Twilio__FromNumber: ${TWILIO_FROM_NUMBER}
      Twilio__IsEnabled: ${TWILIO_IS_ENABLED}
      WhatsApp__PhoneNumberId: ${WHATSAPP_PHONE_NUMBER_ID}
      WhatsApp__AccessToken: ${WHATSAPP_ACCESS_TOKEN}
      WhatsApp__IsEnabled: ${WHATSAPP_IS_ENABLED}
      RETAILERP_DEVUPADHYAY480_PASSWORD: ${RETAILERP_DEVUPADHYAY480_PASSWORD}
      RETAILERP_DEV123MOVIE_PASSWORD: ${RETAILERP_DEV123MOVIE_PASSWORD}
    ports:
      - "8080:8080"
    volumes:
      - app_uploads:/app/wwwroot/uploads
      - app_logs:/app/Logs

  prometheus:
    image: prom/prometheus:latest
    container_name: retailerp-prometheus
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: retailerp-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    restart: unless-stopped

volumes:
  sql_data:
  redis_data:
  app_uploads:
  app_logs:
  grafana-data:

