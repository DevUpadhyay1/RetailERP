name: Deploy Staging

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag (default: staging-<sha>)"
        required: false
        default: ""
      deploy_to_server:
        description: "Deploy to staging server over SSH"
        type: boolean
        required: false
        default: true

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: meta
        shell: bash
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="staging-${GITHUB_SHA::7}"
          fi
          OWNER_LOWER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER_LOWER}/retailerp:$TAG"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.image }}

  deploy-over-ssh:
    runs-on: ubuntu-latest
    needs: build-and-push-image
    environment: staging
    if: ${{ github.event_name == 'push' || github.event.inputs.deploy_to_server == 'true' }}

    steps:
      - name: Validate staging secrets
        id: validate
        shell: bash
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          STAGING_APP_DIR: ${{ secrets.STAGING_APP_DIR }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          set -euo pipefail
          if [ -z "${STAGING_HOST:-}" ] || [ -z "${STAGING_USER:-}" ] || [ -z "${STAGING_SSH_KEY:-}" ] || [ -z "${STAGING_APP_DIR:-}" ] || [ -z "${GHCR_PAT:-}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Staging secrets are missing. Skipping deploy step."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to staging server
        if: ${{ steps.validate.outputs.skip != 'true' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.STAGING_APP_DIR }}"
            export APP_IMAGE="${{ needs.build-and-push-image.outputs.image }}"
            docker login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GHCR_PAT }}"
            docker compose --env-file .env.staging -f docker-compose.prod.yml pull app
            docker compose --env-file .env.staging -f docker-compose.prod.yml up -d
            docker image prune -f
