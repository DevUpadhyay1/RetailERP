# Continuous integration: restore, build, test (path to "10/10" quality)
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      # Initial baseline gate; raise gradually each sprint (e.g. 2 -> 5 -> 10 -> 20+)
      COVERAGE_THRESHOLD: "2"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore RetailERP.sln

      - name: Build
        run: dotnet build RetailERP.sln -c Release --no-restore

      - name: Test with coverage
        run: dotnet test RetailERP.Tests/RetailERP.Tests.csproj -c Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory TestResults

      - name: Coverage debug info
        shell: bash
        run: |
          set -euo pipefail
          echo "Listing TestResults tree"
          find TestResults -maxdepth 4 -type f || true

      - name: Enforce coverage threshold
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import glob
          import os
          import sys
          import xml.etree.ElementTree as ET

          files = glob.glob("TestResults/**/coverage.cobertura.xml", recursive=True)
          if not files:
              print("Coverage report not found under TestResults/**/coverage.cobertura.xml")
              sys.exit(1)

          latest = max(files, key=os.path.getmtime)
          root = ET.parse(latest).getroot()
          line_rate = float(root.attrib.get("line-rate", "0"))
          percent = round(line_rate * 100, 2)
          threshold = float(os.environ.get("COVERAGE_THRESHOLD", "0"))

          print(f"Coverage file: {latest}")
          print(f"Line Coverage: {percent}% (threshold {threshold}%)")

          if percent < threshold:
              print("Coverage threshold check failed.")
              sys.exit(1)

          print("Coverage threshold check passed.")
          PY

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage-cobertura
          path: TestResults/**/coverage.cobertura.xml
