# Continuous integration: restore, build, test (path to "10/10" quality)
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore RetailERP.sln

      - name: Build
        run: dotnet build RetailERP.sln -c Release --no-restore

      - name: Test
        run: dotnet test RetailERP.sln -c Release --no-build --verbosity normal
