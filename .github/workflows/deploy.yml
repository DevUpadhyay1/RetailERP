name: Deploy Pipeline

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    name: Staging & Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run Smoke Tests
        run: |
          echo "Simulating Staging integration checks..."
          echo "Smoke tests passed."

  deploy-production:
    name: Deploy to Production
    needs: smoke-test
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, Windows, X64]
    environment: production
    steps:
      - name: Prepare workspace
        shell: powershell
        run: |
          $checkoutPath = Join-Path $env:GITHUB_WORKSPACE 'repo'
          if (Test-Path $checkoutPath) {
            Remove-Item -LiteralPath $checkoutPath -Recurse -Force -ErrorAction SilentlyContinue
          }

      - name: Checkout
        uses: actions/checkout@v5
        with:
          clean: true
          path: repo

      - name: Build application image
        shell: powershell
        working-directory: repo
        run: |
          Write-Host "Building retailerp:latest ..."
          docker build -t retailerp:latest .
          if ($LASTEXITCODE -ne 0) { throw "Build failed" }

      - name: Deploy stack
        shell: powershell
        working-directory: repo
        run: |
          $envFile = 'C:\7th_Semester\RetailERP\.env.production'
          docker compose -p retailerp --env-file $envFile -f docker-compose.prod.yml up -d
          if ($LASTEXITCODE -ne 0) { throw "Deploy failed" }

      - name: Verify Health
        shell: powershell
        working-directory: repo
        run: |
          Write-Host "Checking health of Production services..."
          docker compose -p retailerp --env-file C:\7th_Semester\RetailERP\.env.production -f docker-compose.prod.yml ps

      - name: Cleanup dangling images
        shell: powershell
        if: always()
        run: docker image prune -f
