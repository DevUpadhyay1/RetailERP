# Automatic self-hosted production deploy on push to main.
# Prerequisites: Runner service account (NT AUTHORITY\NETWORK SERVICE) must be
# in the local "docker-users" group. Run as admin:
#   net localgroup docker-users "NT AUTHORITY\NETWORK SERVICE" /add
# Then restart Docker Desktop and the runner service.

name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Rebuild Docker image before deploy"
        type: boolean
        required: false
        default: true

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy-on-self-hosted:
    runs-on: [self-hosted, Windows, X64]
    environment: production

    steps:
      - name: Prepare workspace
        shell: powershell
        run: |
          $checkoutPath = Join-Path $env:GITHUB_WORKSPACE 'repo'
          if (Test-Path $checkoutPath) {
            Remove-Item -LiteralPath $checkoutPath -Recurse -Force -ErrorAction SilentlyContinue
          }

      - name: Checkout
        uses: actions/checkout@v5
        with:
          clean: true
          path: repo

      - name: Verify Docker connectivity
        shell: powershell
        run: |
          Write-Host "--- Docker Engine ---"
          docker version
          if ($LASTEXITCODE -ne 0) {
            throw "Cannot connect to Docker engine. Ensure NETWORK SERVICE is in docker-users group and Docker Desktop is running."
          }
          Write-Host "--- Docker Compose ---"
          docker compose version

      - name: Build application image
        shell: powershell
        working-directory: repo
        run: |
          Write-Host "Building retailerp:latest ..."
          docker build -t retailerp:latest .
          if ($LASTEXITCODE -ne 0) {
            throw "docker build failed with exit code $LASTEXITCODE"
          }
          Write-Host "Build succeeded."

      - name: Deploy stack
        shell: powershell
        working-directory: repo
        run: |
          $envFile = 'C:\7th_Semester\RetailERP\.env.production'
          if (-not (Test-Path $envFile)) {
            throw "Production env file not found at $envFile"
          }
          docker compose -p retailerp --env-file $envFile -f docker-compose.prod.yml up -d
          if ($LASTEXITCODE -ne 0) {
            throw "docker compose up failed with exit code $LASTEXITCODE"
          }

      - name: Show deployment status
        shell: powershell
        working-directory: repo
        run: |
          $envFile = 'C:\7th_Semester\RetailERP\.env.production'
          docker compose -p retailerp --env-file $envFile -f docker-compose.prod.yml ps

      - name: Cleanup dangling images
        shell: powershell
        if: always()
        run: |
          docker image prune -f

