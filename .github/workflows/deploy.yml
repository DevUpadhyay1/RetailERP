# Automatic Docker build + production deploy on push to main.
# Also supports manual run from: Actions -> Deploy Production -> Run workflow.
#
# Note: Never use `secrets.*` in job-level `if:` — GitHub does not support it and the run can show
# "No jobs were run". Use a workflow_dispatch input (below) instead.

name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag (default: latest)"
        required: false
        default: "latest"
      deploy_to_server:
        description: "After build, SSH deploy to production (needs PROD_* + GHCR_PAT secrets)"
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: meta
        shell: bash
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            if [ "${{ github.event_name }}" = "push" ]; then
              TAG="prod-${GITHUB_SHA::7}"
            else
              TAG="latest"
            fi
          fi
          IMAGE="ghcr.io/${{ github.repository_owner }}/retailerp:$TAG"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.image }}

  deploy-over-ssh:
    runs-on: ubuntu-latest
    needs: build-and-push-image
    environment: production
    # Boolean workflow_dispatch input — safe in job if (unlike secrets.*)
    # Boolean inputs are strings 'true' / 'false' in github.event.inputs
    if: ${{ github.event_name == 'push' || github.event.inputs.deploy_to_server == 'true' }}

    steps:
      - name: Validate production secrets
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_APP_DIR: ${{ secrets.PROD_APP_DIR }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          set -euo pipefail
          missing=()

          [ -n "${PROD_HOST:-}" ] || missing+=("PROD_HOST")
          [ -n "${PROD_USER:-}" ] || missing+=("PROD_USER")
          [ -n "${PROD_SSH_KEY:-}" ] || missing+=("PROD_SSH_KEY")
          [ -n "${PROD_APP_DIR:-}" ] || missing+=("PROD_APP_DIR")
          [ -n "${GHCR_PAT:-}" ] || missing+=("GHCR_PAT")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required production secrets: ${missing[*]}"
            echo "Configure them in GitHub repository settings before auto deploy can run."
            exit 1
          fi

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.PROD_APP_DIR }}"
            export APP_IMAGE="${{ needs.build-and-push-image.outputs.image }}"
            docker login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GHCR_PAT }}"
            docker compose --env-file .env.production -f docker-compose.prod.yml pull app
            docker compose --env-file .env.production -f docker-compose.prod.yml up -d
            docker image prune -f
