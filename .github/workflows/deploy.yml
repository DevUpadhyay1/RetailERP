# Automatic self-hosted production deploy on push to main.
# Designed for local/laptop-hosted production where GitHub-hosted SSH is not reliable.

name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Rebuild Docker image before deploy"
        type: boolean
        required: false
        default: true

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy-on-self-hosted:
    runs-on: [self-hosted, Windows, X64]
    environment: production

    steps:
      - name: Prepare workspace
        shell: powershell
        run: |
          $checkoutPath = Join-Path $env:GITHUB_WORKSPACE 'repo'
          if (Test-Path $checkoutPath) {
            Remove-Item -LiteralPath $checkoutPath -Recurse -Force -ErrorAction SilentlyContinue
          }

      - name: Checkout
        uses: actions/checkout@v5
        with:
          clean: true
          path: repo

      - name: Verify Docker runtime
        shell: powershell
        working-directory: repo
        run: |
          docker version
          docker compose version

      - name: Build application image
        shell: powershell
        working-directory: repo
        run: |
          $logPath = Join-Path (Get-Location) 'deploy-build.log'
          if (Test-Path $logPath) {
            Remove-Item -LiteralPath $logPath -Force -ErrorAction SilentlyContinue
          }
          $env:DOCKER_BUILDKIT = '0'
          docker build -t retailerp:latest . *>&1 | Tee-Object -FilePath $logPath
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Build failed. See $logPath"
            exit $LASTEXITCODE
          }

      - name: Deploy stack
        shell: powershell
        working-directory: repo
        run: |
          $envFile = 'C:\7th_Semester\RetailERP\.env.production'
          if (-not (Test-Path $envFile)) {
            throw "Production env file not found at $envFile"
          }
          docker compose --env-file $envFile -f docker-compose.prod.yml up -d

      - name: Show deployment status
        shell: powershell
        working-directory: repo
        run: |
          $envFile = 'C:\7th_Semester\RetailERP\.env.production'
          docker compose --env-file $envFile -f docker-compose.prod.yml ps

      - name: Cleanup dangling images
        shell: powershell
        run: |
          docker image prune -f
