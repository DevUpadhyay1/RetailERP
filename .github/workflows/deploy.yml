# Manual Docker build + optional SSH deploy.
# Does NOT run on push — use ci.yml for that. Run from: Actions → Deploy Production → Run workflow.
#
# Note: Never use `secrets.*` in job-level `if:` — GitHub does not support it and the run can show
# "No jobs were run". Use a workflow_dispatch input (below) instead.

name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag (default: latest)"
        required: false
        default: "latest"
      deploy_to_server:
        description: "After build, SSH deploy to production (needs PROD_* + GHCR_PAT secrets)"
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  packages: write

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: meta
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ]; then TAG="latest"; fi
          IMAGE="ghcr.io/${{ github.repository_owner }}/retailerp:$TAG"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.image }}

  deploy-over-ssh:
    runs-on: ubuntu-latest
    needs: build-and-push-image
    # Boolean workflow_dispatch input — safe in job if (unlike secrets.*)
    # Boolean inputs are strings 'true' / 'false' in github.event.inputs
    if: ${{ github.event.inputs.deploy_to_server == 'true' }}

    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.PROD_APP_DIR }}"
            export APP_IMAGE="${{ needs.build-and-push-image.outputs.image }}"
            docker login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GHCR_PAT }}"
            docker compose --env-file .env.production -f docker-compose.prod.yml pull app
            docker compose --env-file .env.production -f docker-compose.prod.yml up -d
            docker image prune -f
