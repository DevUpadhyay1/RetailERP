# Automatic self-hosted production deploy on push to main.
# Designed for local/laptop-hosted production where GitHub-hosted SSH is not reliable.

name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Rebuild Docker image before deploy"
        type: boolean
        required: false
        default: true

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy-on-self-hosted:
    runs-on: [self-hosted, Windows, X64]
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify Docker runtime
        shell: powershell
        run: |
          docker version
          docker compose version

      - name: Build application image
        shell: powershell
        run: |
          docker build -t retailerp:latest .

      - name: Deploy stack
        shell: powershell
        run: |
          $envFile = 'C:\7th_Semester\RetailERP\.env.production'
          if (-not (Test-Path $envFile)) {
            throw "Production env file not found at $envFile"
          }
          docker compose --env-file $envFile -f docker-compose.prod.yml up -d

      - name: Show deployment status
        shell: powershell
        run: |
          $envFile = 'C:\7th_Semester\RetailERP\.env.production'
          docker compose --env-file $envFile -f docker-compose.prod.yml ps

      - name: Cleanup dangling images
        shell: powershell
        run: |
          docker image prune -f
